  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 1280px; background: #111827; color: #f8fafc; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif; }
    .stage { position: relative; width: 1280px; height: 720px; overflow: hidden; background: #e5e7eb; }
    .stage > img { display: block; width: 1280px; height: 720px; object-fit: cover; }
    .line-layer { position: absolute; inset: 0; width: 1280px; height: 720px; pointer-events: none; }
    .line-layer line { stroke: #f59e0b; stroke-width: 3; paint-order: stroke; filter: drop-shadow(0 1px 1px #000); }
    .marker {
      position: absolute; width: 30px; height: 30px; margin: -15px 0 0 -15px;
      display: grid; place-items: center; border-radius: 999px; border: 3px solid #fff;
      background: #d97706; color: #fff; font: 800 16px/1 sans-serif;
      box-shadow: 0 2px 7px rgba(0,0,0,.65); z-index: 3;
    }
    .callout {
      position: absolute; max-width: 230px; min-height: 34px; padding: 7px 10px;
      border: 2px solid #fbbf24; border-radius: 8px; background: rgba(17,24,39,.94);
      color: #fff; font-size: 15px; font-weight: 750; line-height: 1.25;
      box-shadow: 0 3px 10px rgba(0,0,0,.45); z-index: 2;
    }
    .callout b { color: #fcd34d; margin-right: 5px; }
    .legend { min-height: 210px; padding: 18px 24px 22px; background: #111827; border-top: 4px solid #f59e0b; }
    .legend h1 { margin: 0 0 12px; color: #fff; font-size: 24px; line-height: 1.25; }
    .legend h1 small { margin-left: 10px; color: #94a3b8; font-size: 14px; font-weight: 500; }
    .legend-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 24px; }
    .legend-item { display: grid; grid-template-columns: 28px 1fr; gap: 8px; align-items: start; font-size: 14px; line-height: 1.4; }
    .legend-item strong { display: grid; place-items: center; width: 24px; height: 24px; border-radius: 50%; background: #d97706; color: white; }
    .legend-item span { color: #e5e7eb; }
    .legend-note { margin: 12px 0 0; color: #94a3b8; font-size: 12px; }
  </style>
</head>

    const screen = screens[key];

    const root = document.getElementById("root");
    const stage = document.createElement("section");
    stage.className = "stage";
    const img = document.createElement("img");
    img.src = screen.image;
    img.alt = screen.title;
    stage.appendChild(img);
    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("class", "line-layer");
    for (const [n, x, y, bx, by, short] of screen.points) {
      const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
      line.setAttribute("x1", x); line.setAttribute("y1", y);
      line.setAttribute("x2", bx + 88); line.setAttribute("y2", by + 18);
      svg.appendChild(line);
      const marker = document.createElement("span");
      marker.className = "marker"; marker.textContent = n;
      marker.style.left = `${x}px`; marker.style.top = `${y}px`;
      stage.appendChild(marker);
      const box = document.createElement("div");
      box.className = "callout"; box.innerHTML = `<b>${n}</b>${short}`;
      box.style.left = `${bx}px`; box.style.top = `${by}px`;
      stage.appendChild(box);
    }
    stage.insertBefore(svg, stage.children[1]);
    const legend = document.createElement("section");
    legend.className = "legend";
    legend.innerHTML = `<h1>${screen.title}<small>實際 Dashboard 畫面＋中文標註</small></h1><div class="legend-grid">${screen.points.map(([n,,,,,short,detail]) => `<div class="legend-item"><strong>${n}</strong><span><b>${short}：</b>${detail}</span></div>`).join("")}</div><p class="legend-note">標註只疊加說明層；底圖為本機實際 Dashboard，未重製或改寫介面內容。</p>`;
    root.append(stage, legend);
    img.addEventListener("load", () => document.body.dataset.ready = "true");

</body>
</html>
